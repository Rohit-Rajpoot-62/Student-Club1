.switch{

.social{

input{

.radio-group label{

.switch{

<body>

<nav>

</nav>
 
<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- LOGIN -->
    <div id="loginBox">
      <h2>LOGIN</h2>
      <p>Welcome back to Student Club</p>

      <input type="email" placeholder="Email" class="input1">
      <input type="password" placeholder="Password" class="input2">

      <button onclick="login()">Login</button>

      <div class="switch">
        Don’t have an account? <span onclick="showSignup()">Signup</span>
      </div>
    </div>
    


    <!-- SIGNUP -->
    <div id="signupBox" class="hide">
      <h2>SIGN UP</h2>
      <p>Create your account</p>

      <input type="email" placeholder="Email">
      <input type="text" placeholder="Mobile Number">
      <input type="password" placeholder="Create Password">
      <input type="password" placeholder="Confirm Password">

      <div class="radio-group">
        <label><input type="radio" name="role2" checked> Student</label>
        <label><input type="radio" name="role2"> Teacher</label>
      </div>

      <button>Signup</button>

      <div class="switch">
        Already have an account? <span onclick="showLogin()">Login</span>
      </div>

      <div class="social">
        <button><i class="fa-brands fa-google"></i> Login with Google</button>
        <button><i class="fa-brands fa-facebook"></i> Login with Facebook</button>
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <img id="loginImg" src="https://i.postimg.cc/y83WwfNR/IMG-20260114-WA0061.jpg" alt="Student studying together">
    <img id="signupImg" src="https://i.postimg.cc/X7mYcwgM/IMG-20260114-WA0062.jpg" alt="Students celebrating" class="hide" height="auto" >
  </div>

</div>

<script>
function showSignup(){
  document.getElementById("loginBox").classList.add("hide");
  document.getElementById("signupBox").classList.remove("hide");
  // swap illustrations
  const li = document.getElementById('loginImg');
  const si = document.getElementById('signupImg');
  if(li) li.classList.add('hide');
  if(si) si.classList.remove('hide');
}
function showLogin(){
  document.getElementById("signupBox").classList.add("hide");
  document.getElementById("loginBox").classList.remove("hide");
  // swap illustrations back
  const li = document.getElementById('loginImg');
  const si = document.getElementById('signupImg');
  if(si) si.classList.add('hide');
  if(li) li.classList.remove('hide');
}
